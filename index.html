<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MASV Web Uploader Example</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 720px;
        margin: 40px auto;
        padding: 0 16px;
        line-height: 1.5;
      }

      label {
        display: block;
        margin-top: 16px;
        font-weight: 600;
      }

      input,
      button {
        margin-top: 8px;
        padding: 8px;
        width: 100%;
        box-sizing: border-box;
      }

      button {
        cursor: pointer;
      }

      #status {
        margin-top: 20px;
        padding: 12px;
        background: #f5f5f5;
        border: 1px solid #ddd;
        white-space: pre-wrap;
      }

      #progress {
        margin-top: 12px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <h1>Upload a file to MASV</h1>

    <label for="portalSubdomain">Portal subdomain</label>
    <input
      id="portalSubdomain"
      type="text"
      placeholder="example1234"
      value="YOUR_PORTAL_SUBDOMAIN"
    />

    <label for="packageName">Package name</label>
    <input
      id="packageName"
      type="text"
      placeholder="My first upload"
      value="My first upload"
    />

    <label for="senderEmail">Sender email</label>
    <input
      id="senderEmail"
      type="email"
      placeholder="name@example.com"
      value="name@example.com"
    />

    <label for="packageDescription">Package description</label>
    <input
      id="packageDescription"
      type="text"
      placeholder="Uploaded from my web app"
      value="Uploaded from my web app"
    />

    <label for="fileInput">Choose file(s)</label>
    <input id="fileInput" type="file" multiple />

    <button id="uploadButton">Create package and upload</button>

    <div id="progress">Progress: 0%</div>
    <div id="status">Ready.</div>

    <script type="module">
      import { Uploader } from "https://esm.sh/@masvio/uploader";

      const API_URL = "https://api.massive.app";

      const portalSubdomainInput = document.getElementById("portalSubdomain");
      const packageNameInput = document.getElementById("packageName");
      const senderEmailInput = document.getElementById("senderEmail");
      const packageDescriptionInput =
        document.getElementById("packageDescription");
      const fileInput = document.getElementById("fileInput");
      const uploadButton = document.getElementById("uploadButton");
      const progressEl = document.getElementById("progress");
      const statusEl = document.getElementById("status");

      function setStatus(message) {
        statusEl.textContent = message;
      }

      function appendStatus(message) {
        statusEl.textContent += `\n${message}`;
      }

      async function fetchPortalID(subdomain) {
        const response = await fetch(
          `${API_URL}/v1/subdomains/portals/${encodeURIComponent(subdomain)}`
        );

        if (!response.ok) {
          throw new Error(
            `Failed to fetch Portal ID. HTTP ${response.status}`
          );
        }

        const { id } = await response.json();

        if (!id) {
          throw new Error("Portal ID was not returned by MASV.");
        }

        return id;
      }

      async function createPackage(portalID, packageName, senderEmail, description) {
        const response = await fetch(`${API_URL}/v1/portals/${portalID}/packages`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            name: packageName,
            sender: senderEmail,
            description,
          }),
        });

        if (!response.ok) {
          throw new Error(
            `Failed to create package. HTTP ${response.status}`
          );
        }

        const { id, access_token } = await response.json();

        if (!id || !access_token) {
          throw new Error("Package ID or access token was not returned by MASV.");
        }

        return { id, access_token };
      }

      function buildMasvFiles(fileList) {
        return Array.from(fileList).map((file) => ({
          id: crypto.randomUUID(),
          file,
          path: file.webkitRelativePath || file.name,
        }));
      }

      function wireUploaderEvents(uploader) {
        uploader.on(Uploader.UploaderEvents.Created, (event) => {
          appendStatus(`Uploader created at ${new Date(event.time).toLocaleTimeString()}`);
        });

        uploader.on(Uploader.UploaderEvents.Start, () => {
          appendStatus("Upload started.");
        });

        uploader.on(Uploader.UploaderEvents.FileQueued, (event) => {
          appendStatus(`File queued: ${event?.data?.file?.path ?? "unknown file"}`);
        });

        uploader.on(Uploader.UploaderEvents.Progress, (event) => {
          const maybePercent =
            event?.data?.progress ??
            event?.data?.percent ??
            event?.data?.percentage;

          if (typeof maybePercent === "number") {
            const rounded = Math.max(0, Math.min(100, Math.round(maybePercent)));
            progressEl.textContent = `Progress: ${rounded}%`;
          } else {
            progressEl.textContent = "Progress: uploading...";
          }
        });

        uploader.on(Uploader.UploaderEvents.Retry, () => {
          appendStatus("Retrying a request.");
        });

        uploader.on(Uploader.UploaderEvents.Error, (event) => {
          console.error("MASV upload error:", event);
          appendStatus("Upload error occurred. Check console for details.");
        });

        uploader.on(Uploader.UploaderEvents.Finished, () => {
          progressEl.textContent = "Progress: 100%";
          appendStatus("Upload finished successfully.");
        });

        uploader.on(Uploader.UploaderEvents.Stalled, () => {
          appendStatus("Upload stalled. Waiting for progress to resume.");
        });

        uploader.on(Uploader.UploaderEvents.FileUnreadable, () => {
          appendStatus("One of the selected files could not be read by the browser.");
        });
      }

      uploadButton.addEventListener("click", async () => {
        try {
          const subdomain = portalSubdomainInput.value.trim();
          const packageName = packageNameInput.value.trim();
          const senderEmail = senderEmailInput.value.trim();
          const description = packageDescriptionInput.value.trim();
          const selectedFiles = fileInput.files;

          if (!subdomain) {
            throw new Error("Enter a Portal subdomain.");
          }

          if (!packageName) {
            throw new Error("Enter a package name.");
          }

          if (!senderEmail) {
            throw new Error("Enter a sender email.");
          }

          if (!selectedFiles || selectedFiles.length === 0) {
            throw new Error("Select at least one file.");
          }

          setStatus("Looking up Portal ID...");
          progressEl.textContent = "Progress: 0%";

          const portalID = await fetchPortalID(subdomain);

          appendStatus(`Portal ID resolved: ${portalID}`);
          appendStatus("Creating package...");

          const { id: packageID, access_token: packageToken } = await createPackage(
            portalID,
            packageName,
            senderEmail,
            description
          );

          appendStatus(`Package created: ${packageID}`);
          appendStatus("Initializing uploader...");

          const uploader = new Uploader(packageID, packageToken, API_URL);
          wireUploaderEvents(uploader);

          const masvFiles = buildMasvFiles(selectedFiles);

          appendStatus(`Adding ${masvFiles.length} file(s) to uploader...`);

          uploader.addFiles(...masvFiles);

          appendStatus("Files added. Upload proceeds automatically.");
        } catch (error) {
          console.error(error);
          setStatus(`Error: ${error.message}`);
        }
      });
    </script>
  </body>
</html>
